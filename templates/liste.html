<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Liste des Étudiants</title>
</head>

<body class="container mt-5">
    <nav class="mb-4">
        <a href="/" class="btn btn-outline-dark">Accueil (Stats)</a>
        <a href="/liste" class="btn btn-primary">Liste des étudiants</a>
        <a href="/ajouter" class="btn btn-outline-success">Ajouter un étudiant</a>
    </nav>
    <h2>Liste des Étudiants inscrits</h2>
    <table class="table table-hover mt-3 shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Prénom</th>
                <th>Nom</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for etu in etudiants %}
            <tr>
                <td>{{ etu.id }}</td>
                <td>{{ etu.prenom }}</td>
                <td>{{ etu.nom }}</td>
                <td><a href="/supprimer/{{ etu.id }}" class="btn btn-danger btn-sm">Supprimer</a></td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center">Aucun étudiant pour le moment.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
