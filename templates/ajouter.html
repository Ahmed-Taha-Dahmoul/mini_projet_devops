<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ajouter un Étudiant</title>
</head>

<body class="container mt-5">
    <nav class="mb-4">
        <a href="/" class="btn btn-outline-dark">Accueil (Stats)</a>
        <a href="/liste" class="btn btn-outline-primary">Liste des étudiants</a>
        <a href="/ajouter" class="btn btn-success">Ajouter un étudiant</a>
    </nav>
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h2>Ajouter un nouvel étudiant</h2>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Prénom :</label>
                    <input type="text" name="prenom" class="form-control" placeholder="Ex: Jean" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nom :</label>
                    <input type="text" name="nom" class="form-control" placeholder="Ex: Dupont" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Enregistrer l'étudiant</button>
            </form>
        </div>
    </div>
</body>

</html>
